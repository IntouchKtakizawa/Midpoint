services:
  - type: web
    name: midpoint-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PROVIDER
        value: osm
      - key: NODE_VERSION
        value: 20.11.0

  - type: web
    name: midpoint-web
    runtime: static
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://midpoint-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
